name: Check Babyschwimmen

on:
  schedule:
    - cron: "*/1 * * * *"

  workflow_dispatch:

jobs:
  check:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: playwright install chromium

      - run: python src/check.py
